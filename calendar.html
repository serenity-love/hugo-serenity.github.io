<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Mini Aesthetic Calendar</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Paperlogy-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Paperlogy-Bold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            --gradient-start: #FFF0F2; 
            --gradient-end: #D7EDE9;   
            --panel-bg: rgba(255, 255, 255, 0.93);
            
            --color-dark: #1F302D;     
            --color-accent: #EAA4AE;   
            --color-muted: #8FA4A0;    
            --line-color: rgba(44, 74, 68, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Paperlogy', 'Pretendard', sans-serif;
            border-radius: 0 !important; 
        }

        body {
            background: linear-gradient(135deg, var(--gradient-start) 0%, #FFFFFF 50%, var(--gradient-end) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px; /* 패딩 축소 */
        }

        .calendar-container {
            background-color: var(--panel-bg);
            border: 1px solid rgba(31, 48, 45, 0.15);
            width: 100%;
            max-width: 320px; /* 가로 크기 축소 (400px -> 320px) */
            padding: 24px 20px; /* 내부 여백 축소 (40px -> 24px) */
            box-shadow: 0 10px 25px rgba(44, 74, 68, 0.05), 
                        6px 6px 0px rgba(234, 164, 174, 0.15);
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px; /* 간격 축소 */
        }

        .brand-title {
            font-size: 10px;
            font-weight: 700;
            color: var(--color-accent);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .today-marker {
            font-size: 10px;
            color: var(--color-muted);
            font-weight: 500;
        }

        /* 월 선택 바 간격 축소 */
        .calendar-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line-color);
        }

        .month-display {
            font-size: 16px; /* 폰트 크기 축소 */
            font-weight: 700;
            color: var(--color-dark);
            letter-spacing: -0.5px;
        }

        .btn-nav {
            background: none;
            border: none;
            color: var(--color-dark);
            font-size: 14px;
            cursor: pointer;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-nav:hover {
            color: var(--color-accent);
        }

        /* 날짜 그리드 조밀하게 조정 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 6px; /* 행 간격 축소 (14px -> 6px) */
            text-align: center;
        }

        .weekday {
            font-size: 10px;
            font-weight: 700;
            color: var(--color-muted);
            padding-bottom: 8px;
        }

        .weekday:nth-child(7n+1), .day:nth-child(7n+1) { color: var(--color-accent); }
        .weekday:nth-child(7n), .day:nth-child(7n) { color: #6D8E88; }

        .day {
            font-size: 12px; /* 날짜 크기 축소 */
            font-weight: 500;
            height: 28px; /* 날짜 높이 축소 (36px -> 28px) */
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-dark);
            position: relative;
            cursor: default;
        }

        .day.empty {
            pointer-events: none;
        }

        /* 작아진 크기에 맞게 하이라이트 원 크기 조정 */
        .day.today-highlight {
            font-weight: 700;
            color: var(--color-dark) !important;
        }

        .day.today-highlight::before {
            content: '';
            position: absolute;
            width: 22px; /* 축소 */
            height: 22px; /* 축소 */
            border: 1px dashed var(--color-accent);
            background-color: rgba(255, 240, 242, 0.6);
            z-index: -1;
            animation: rotateNode 12s linear infinite;
        }

        .day.today-highlight::after {
            content: '';
            position: absolute;
            top: 1px;
            right: 2px;
            width: 3px;
            height: 3px;
            background-color: var(--color-accent);
        }

        @keyframes rotateNode {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <header>
            <div class="brand-title">叙情 / 2026</div>
            <div class="today-marker" id="todayMarker">00.00 TODAY</div>
        </header>

        <div class="calendar-nav">
            <div class="month-display" id="monthDisplay">January</div>
            <div style="display: flex; gap: 4px;">
                <button class="btn-nav" onclick="moveMonth(-1)">&lt;</button>
                <button class="btn-nav" onclick="moveMonth(1)">&gt;</button>
            </div>
        </div>

        <div class="calendar-grid">
            <div class="weekday">S</div>
            <div class="weekday">M</div>
            <div class="weekday">T</div>
            <div class="weekday">W</div>
            <div class="weekday">T</div>
            <div class="weekday">F</div>
            <div class="weekday">S</div>

            <div id="daysContainer" style="display: contents;"></div>
        </div>
    </div>

    <script>
        const today = new Date();
        let currentYear = 2026;
        let currentMonth = today.getMonth();

        const monthNames = [
            "January", "February", "March", "April", "May", "June", 
            "July", "August", "September", "October", "November", "December"
        ];

        document.addEventListener("DOMContentLoaded", function() {
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('todayMarker').textContent = `${mm}.${dd} TODAY`;

            renderCalendar(currentYear, currentMonth);
        });

        function renderCalendar(year, month) {
            const daysContainer = document.getElementById('daysContainer');
            const monthDisplay = document.getElementById('monthDisplay');

            monthDisplay.textContent = `${monthNames[month]} ${year}`;
            daysContainer.innerHTML = '';

            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const emptySlot = document.createElement('div');
                emptySlot.className = 'day empty';
                daysContainer.appendChild(emptySlot);
            }

            for (let day = 1; day <= totalDays; day++) {
                const daySlot = document.createElement('div');
                daySlot.className = 'day';
                daySlot.textContent = day;

                if (
                    year === today.getFullYear() &&
                    month === today.getMonth() &&
                    day === today.getDate()
                ) {
                    daySlot.classList.add('today-highlight');
                }

                daysContainer.appendChild(daySlot);
            }
        }

        function moveMonth(direction) {
            currentMonth += direction;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar(currentYear, currentMonth);
        }
    </script>
</body>
</html>
