<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Responsive Aesthetic Calendar</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Paperlogy-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Paperlogy-Bold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            --gradient-start: #FFF0F2; 
            --gradient-end: #D7EDE9;   
            --panel-bg: rgba(255, 255, 255, 0.93);
            
            --color-dark: #1F302D;     
            --color-accent: #EAA4AE;   
            --color-muted: #8FA4A0;    
            --line-color: rgba(44, 74, 68, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Paperlogy', 'Pretendard', sans-serif;
            border-radius: 0 !important; 
        }

        body {
            background: linear-gradient(135deg, var(--gradient-start) 0%, #FFFFFF 50%, var(--gradient-end) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4%; /* 화면 크기에 맞게 패딩 유연화 */
        }

        .calendar-container {
            background-color: var(--panel-bg);
            border: 1px solid rgba(31, 48, 45, 0.15);
            width: 100%;
            max-width: 360px; /* 최대 가로 크기 제한 */
            min-width: 260px; /* 최소 가로 크기 보장 */
            padding: 7% 6%; /* 내부 여백도 화면 비례로 유연하게 */
            box-shadow: 0 10px 25px rgba(44, 74, 68, 0.05), 
                        6px 6px 0px rgba(234, 164, 174, 0.15);
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6%;
        }

        .brand-title {
            font-size: clamp(10px, 3vw, 11px); /* 창 크기에 맞춰 폰트 유동적 조절 */
            font-weight: 700;
            color: var(--color-accent);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .today-marker {
            font-size: clamp(10px, 3vw, 11px);
            color: var(--color-muted);
            font-weight: 500;
        }

        .calendar-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6%;
            padding-bottom: 3%;
            border-bottom: 1px solid var(--line-color);
        }

        .month-display {
            font-size: clamp(15px, 4.5vw, 18px);
            font-weight: 700;
            color: var(--color-dark);
            letter-spacing: -0.5px;
        }

        .btn-nav {
            background: none;
            border: none;
            color: var(--color-dark);
            font-size: clamp(13px, 4vw, 16px);
            cursor: pointer;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-nav:hover {
            color: var(--color-accent);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 2%; /* 격자 간격 유연화 */
            text-align: center;
        }

        .weekday {
            font-size: clamp(10px, 3vw, 11px);
            font-weight: 700;
            color: var(--color-muted);
            padding-bottom: 6%;
        }

        .weekday:nth-child(7n+1), .day:nth-child(7n+1) { color: var(--color-accent); }
        .weekday:nth-child(7n), .day:nth-child(7n) { color: #6D8E88; }

        .day {
            font-size: clamp(11px, 3.5vw, 13px);
            font-weight: 500;
            aspect-ratio: 1 / 1; /* 날짜 칸이 언제나 1:1 정정사각형을 유지하도록 설정 */
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-dark);
            position: relative;
            cursor: default;
        }

        .day.empty {
            pointer-events: none;
        }

        /* 크기에 맞게 조절되는 가변형 오늘 하이라이트 */
        .day.today-highlight {
            font-weight: 700;
            color: var(--color-dark) !important;
        }

        .day.today-highlight::before {
            content: '';
            position: absolute;
            width: 76%; /* 날짜 칸 크기에 연동되도록 %로 처리 */
            height: 76%; 
            border: 1px dashed var(--color-accent);
            background-color: rgba(255, 240, 242, 0.6);
            z-index: -1;
            animation: rotateNode 12s linear infinite;
        }

        .day.today-highlight::after {
            content: '';
            position: absolute;
            top: 10%;
            right: 12%;
            width: 3px;
            height: 3px;
            background-color: var(--color-accent);
        }

        @keyframes rotateNode {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <header>
            <div class="brand-title">叙情 / 2026</div>
            <div class="today-marker" id="todayMarker">00.00 TODAY</div>
        </header>

        <div class="calendar-nav">
            <div class="month-display" id="monthDisplay">January</div>
            <div style="display: flex; gap: 4px;">
                <button class="btn-nav" onclick="moveMonth(-1)">&lt;</button>
                <button class="btn-nav" onclick="moveMonth(1)">&gt;</button>
            </div>
        </div>

        <div class="calendar-grid">
            <div class="weekday">S</div>
            <div class="weekday">M</div>
            <div class="weekday">T</div>
            <div class="weekday">W</div>
            <div class="weekday">T</div>
            <div class="weekday">F</div>
            <div class="weekday">S</div>

            <div id="daysContainer" style="display: contents;"></div>
        </div>
    </div>

    <script>
        const today = new Date();
        let currentYear = 2026;
        let currentMonth = today.getMonth();

        const monthNames = [
            "January", "February", "March", "April", "May", "June", 
            "July", "August", "September", "October", "November", "December"
        ];

        document.addEventListener("DOMContentLoaded", function() {
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('todayMarker').textContent = `${mm}.${dd} TODAY`;

            renderCalendar(currentYear, currentMonth);
        });

        function renderCalendar(year, month) {
            const daysContainer = document.getElementById('daysContainer');
            const monthDisplay = document.getElementById('monthDisplay');

            monthDisplay.textContent = `${monthNames[month]} ${year}`;
            daysContainer.innerHTML = '';

            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const emptySlot = document.createElement('div');
                emptySlot.className = 'day empty';
                daysContainer.appendChild(emptySlot);
            }

            for (let day = 1; day <= totalDays; day++) {
                const daySlot = document.createElement('div');
                daySlot.className = 'day';
                daySlot.textContent = day;

                if (
                    year === today.getFullYear() &&
                    month === today.getMonth() &&
                    day === today.getDate()
                ) {
                    daySlot.classList.add('today-highlight');
                }

                daysContainer.appendChild(daySlot);
            }
        }

        function moveMonth(direction) {
            currentMonth += direction;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar(currentYear, currentMonth);
        }
    </script>
</body>
</html>
