<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mini Space - Link Archive</title>
    <!-- 페이퍼로지(Paperlogy) 폰트 불러오기 및 기본 한글 폰트 백업 -->
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
        
        /* 페이퍼로지 폰트 웹폰트 정의 */
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Paperlogy-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Paperlogy-Bold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            /* 우유를 듬뿍 탄 마일드하고 부드러운 파스텔 톤 */
            --bg-mint: #F0F9F8;        
            --main-mint: #D1EFEA;      
            --dark-mint: #86C1B9;      
            
            --bg-pink: #FFF0F2;        
            --main-pink: #FCDADF;      
            --dark-pink: #EAA4AE;      
            
            --text-dark: #4A5157;      
            --text-muted: #9EADB6;     
            --frame-border: #B2C3CD;   
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Paperlogy', 'Pretendard', sans-serif;
            border-radius: 0 !important; /* 모서리 절대 직각 */
        }

        body {
            background-color: var(--bg-pink);
            background-image: linear-gradient(var(--bg-mint) 1px, transparent 1px),
                              linear-gradient(90deg, var(--bg-mint) 1px, transparent 1px);
            background-size: 20px 20px; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .minihomepy-container {
            display: flex;
            align-items: flex-start;
            position: relative;
            max-width: 580px;
            width: 100%;
        }

        .outer-frame {
            background-color: var(--main-mint);
            border: 1px solid var(--frame-border);
            padding: 13px;
            width: 100%;
            box-shadow: 5px 5px 0px rgba(74, 81, 87, 0.08);
        }

        .inner-frame {
            background-color: #FFFFFF;
            border: 1px dashed var(--frame-border);
            padding: 28px 24px;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid var(--bg-mint);
            padding-bottom: 12px;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: -0.3px;
        }

        header .counter {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0px;
        }

        header .counter .today {
            color: var(--dark-pink);
            font-weight: 700;
        }

        .input-section {
            margin-bottom: 20px;
        }

        .input-section > label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--dark-mint);
            margin-bottom: 8px;
            letter-spacing: -0.2px;
        }

        .input-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .input-row {
            display: flex;
            gap: 5px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--frame-border);
            font-size: 13px;
            color: var(--text-dark);
            background-color: #FAFBFB;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--dark-mint);
            background-color: #FFFFFF;
        }

        .btn-remove {
            width: 36px;
            padding: 0;
            background-color: #FFFFFF;
            color: var(--dark-pink);
            font-weight: bold;
            border: 1px solid var(--frame-border);
            cursor: pointer;
        }
        
        .btn-remove:hover {
            background-color: var(--bg-pink);
            border-color: var(--dark-pink);
        }

        .btn-add {
            width: 100%;
            padding: 8px;
            background-color: var(--bg-mint);
            border: 1px dashed var(--dark-mint);
            color: var(--dark-mint);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 16px;
            box-shadow: none;
        }

        .btn-add:hover {
            background-color: var(--main-mint);
            color: var(--text-dark);
        }

        .btn-group {
            display: flex;
            gap: 6px;
            margin-bottom: 28px;
        }

        .btn-action {
            flex: 1;
            padding: 11px 0;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--frame-border);
            background-color: #FFFFFF;
            color: var(--text-dark);
            box-shadow: 1px 1px 0px var(--frame-border);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn-action:active {
            box-shadow: none;
            transform: translate(1px, 1px);
        }

        .btn-run {
            background-color: var(--main-pink);
            border-color: var(--dark-pink);
            color: var(--text-dark);
            box-shadow: 1px 1px 0px var(--dark-pink);
        }

        /* 결과 화면 디자인 (하이퍼링크 스타일) */
        .result-section {
            display: none;
            border: 1px solid #E4EBEF;
            background-color: #FAFBFB;
            padding: 16px;
        }

        .result-title-bar {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 10px;
            border-bottom: 1px dotted #E4EBEF;
            padding-bottom: 6px;
        }

        .result-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-link {
            display: block;
            font-size: 13px;
            color: var(--dark-mint);
            text-decoration: none;
            word-break: break-all;
            line-height: 1.5;
            background-color: #FFFFFF;
            border: 1px solid #E4EBEF;
            padding: 12px;
            transition: all 0.2s ease;
        }

        .result-link:hover {
            background-color: var(--bg-mint);
            border-color: var(--dark-mint);
            text-decoration: underline;
            color: var(--text-dark);
        }

        /* 미니홈피 우측 장식용 세로 탭 */
        .side-tabs {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-left: -1px; 
            margin-top: 24px;
        }

        .tab {
            background-color: var(--main-pink);
            border: 1px solid var(--frame-border);
            border-left: none;
            color: var(--text-dark);
            font-size: 11px;
            font-weight: 700;
            padding: 10px 6px;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            cursor: default;
        }

        .tab.active {
            background-color: #FFFFFF;
            border-right: 1px solid transparent;
            z-index: 2;
            color: var(--dark-pink);
        }
    </style>
</head>
<body>

    <div class="minihomepy-container">
        <!-- 메인 미니홈피 창 -->
        <div class="outer-frame">
            <div class="inner-frame">
                <header>
                    <h1>사이버-𝖴𝖱𝖫 보관함</h1>
                    <div class="counter">TODAY <span class="today">1</span> | TOTAL 999</div>
                </header>

                <div class="input-section">
                    <label>┌─ 저장할 링크 주소 입력 ─┐</label>
                    <div class="input-list" id="inputList">
                        <div class="input-row">
                            <input type="text" class="url-input" placeholder="http://..." autocomplete="off">
                            <button class="btn-remove" onclick="removeInput(this)" title="삭제">X</button>
                        </div>
                    </div>
                    <button class="btn-add" onclick="addInput()">+ URL 추가하기</button>
                </div>

                <div class="btn-group">
                    <button class="btn-action btn-run" onclick="saveLinks()">링크 저장하기</button>
                    <button class="btn-action" onclick="clearAll()">전체 비우기</button>
                </div>

                <div class="result-section" id="resultPanel">
                    <div class="result-title-bar">
                        <span>저장된 링크 (클릭하면 새 창으로 이동합니다)</span>
                    </div>
                    <div class="result-list" id="resultContainer">
                        <!-- 링크 아이템들이 여기에 추가됩니다 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 우측 감성 데코 탭 -->
        <div class="side-tabs">
            <div class="tab active">홈</div>
            <div class="tab" style="background-color: var(--main-mint);">링크</div>
        </div>
    </div>

    <script>
        // 새로운 URL 입력칸 추가
        function addInput() {
            const inputList = document.getElementById('inputList');
            const row = document.createElement('div');
            row.className = 'input-row';
            row.innerHTML = `
                <input type="text" class="url-input" placeholder="http://..." autocomplete="off">
                <button class="btn-remove" onclick="removeInput(this)" title="삭제">X</button>
            `;
            inputList.appendChild(row);
        }

        // 특정 URL 입력칸 삭제
        function removeInput(btnElement) {
            const row = btnElement.parentElement;
            const inputList = document.getElementById('inputList');
            // 최소 1개의 입력칸은 남겨둠
            if (inputList.children.length > 1) {
                inputList.removeChild(row);
            } else {
                row.querySelector('.url-input').value = '';
            }
        }

        // URL을 하이퍼링크로 렌더링하는 로직
        function saveLinks() {
            const inputs = document.querySelectorAll('.url-input');
            const resultContainer = document.getElementById('resultContainer');
            const resultPanel = document.getElementById('resultPanel');
            
            resultContainer.innerHTML = ''; // 기존 결과 초기화
            let hasValidUrl = false;

            inputs.forEach((input) => {
                let urlString = input.value.trim();
                if (!urlString) return; // 빈 칸은 건너뜀

                // 프로토콜(http/https)이 없으면 기본으로 추가하여 링크가 정상 작동하도록 처리
                if (!/^https?:\/\//i.test(urlString)) {
                    urlString = 'http://' + urlString;
                }

                // a 태그(하이퍼링크) 생성
                const linkElement = document.createElement('a');
                linkElement.className = 'result-link';
                linkElement.href = urlString;
                linkElement.target = '_blank'; // 새 탭에서 열기
                linkElement.rel = 'noopener noreferrer'; // 보안 속성
                linkElement.textContent = urlString;
                
                resultContainer.appendChild(linkElement);
                hasValidUrl = true;
            });

            if (hasValidUrl) {
                resultPanel.style.display = 'block';
            } else {
                alert('저장할 URL 주소를 1개 이상 입력해주세요.');
            }
        }

        // 전체 초기화
        function clearAll() {
            const inputList = document.getElementById('inputList');
            inputList.innerHTML = `
                <div class="input-row">
                    <input type="text" class="url-input" placeholder="http://..." autocomplete="off">
                    <button class="btn-remove" onclick="removeInput(this)" title="삭제">X</button>
                </div>
            `;
            document.getElementById('resultPanel').style.display = 'none';
        }
    </script>
</body>
</html>
