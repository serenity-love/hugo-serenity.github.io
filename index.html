<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mini Space - Multi URL Prettifier</title>
    <!-- 페이퍼로지(Paperlogy) 폰트 불러오기 및 기본 한글 폰트 백업 -->
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
        
        /* 페이퍼로지 폰트 웹폰트 정의 */
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Paperlogy-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Paperlogy-Bold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            /* 우유를 듬뿍 탄 마일드하고 부드러운 파스텔 톤 */
            --bg-mint: #F0F9F8;        /* 우유 탄 아주 연한 민트 배경 */
            --main-mint: #D1EFEA;      /* 우유 듬뿍 민트색 */
            --dark-mint: #86C1B9;      /* 차분하게 톤 다운된 민트 */
            
            --bg-pink: #FFF0F2;        /* 우유 탄 아주 연한 분홍 배경 */
            --main-pink: #FCDADF;      /* 딸기우유색 */
            --dark-pink: #EAA4AE;      /* 차분하게 톤 다운된 분홍 */
            
            --text-dark: #4A5157;      /* 너무 세지 않은 부드러운 차콜 */
            --text-muted: #9EADB6;     /* 흐린 감성 폰트색 */
            --frame-border: #B2C3CD;   /* 차분한 테두리 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* 페이퍼로지 폰트를 최우선 적용 */
            font-family: 'Paperlogy', 'Pretendard', sans-serif;
            border-radius: 0 !important; /* 모서리 절대 직각 */
        }

        body {
            background-color: var(--bg-pink);
            background-image: linear-gradient(var(--bg-mint) 1px, transparent 1px),
                              linear-gradient(90deg, var(--bg-mint) 1px, transparent 1px);
            background-size: 20px 20px; /* 미니홈피 모눈종이 패턴 */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 미니홈피 전체 레이아웃 */
        .minihomepy-container {
            display: flex;
            align-items: flex-start;
            position: relative;
            max-width: 580px;
            width: 100%;
        }

        /* 미니홈피 외곽 마일드 민트 프레임 */
        .outer-frame {
            background-color: var(--main-mint);
            border: 1px solid var(--frame-border);
            padding: 13px;
            width: 100%;
            box-shadow: 5px 5px 0px rgba(74, 81, 87, 0.08);
        }

        /* 미니홈피 내부 흰색 스킨 */
        .inner-frame {
            background-color: #FFFFFF;
            border: 1px dashed var(--frame-border);
            padding: 28px 24px;
            position: relative;
        }

        /* 상단 타이틀 바 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid var(--bg-mint);
            padding-bottom: 12px;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: -0.3px;
        }

        header .counter {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0px;
        }

        header .counter .today {
            color: var(--dark-pink);
            font-weight: 700;
        }

        /* 입력 폼 영역 */
        .input-section {
            margin-bottom: 20px;
        }

        .input-section > label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--dark-mint);
            margin-bottom: 8px;
            letter-spacing: -0.2px;
        }

        .input-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .input-row {
            display: flex;
            gap: 5px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--frame-border);
            font-size: 13px;
            color: var(--text-dark);
            background-color: #FAFBFB;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--dark-mint);
            background-color: #FFFFFF;
        }

        .btn-remove {
            width: 36px;
            padding: 0;
            background-color: #FFFFFF;
            color: var(--dark-pink);
            font-weight: bold;
            border: 1px solid var(--frame-border);
            cursor: pointer;
        }
        
        .btn-remove:hover {
            background-color: var(--bg-pink);
            border-color: var(--dark-pink);
        }

        .btn-add {
            width: 100%;
            padding: 8px;
            background-color: var(--bg-mint);
            border: 1px dashed var(--dark-mint);
            color: var(--dark-mint);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 16px;
            box-shadow: none;
        }

        .btn-add:hover {
            background-color: var(--main-mint);
            color: var(--text-dark);
        }

        /* 버튼 영역 */
        .btn-group {
            display: flex;
            gap: 6px;
            margin-bottom: 28px;
        }

        .btn-action {
            flex: 1;
            padding: 11px 0;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--frame-border);
            background-color: #FFFFFF;
            color: var(--text-dark);
            box-shadow: 1px 1px 0px var(--frame-border);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn-action:active {
            box-shadow: none;
            transform: translate(1px, 1px);
        }

        .btn-run {
            background-color: var(--main-pink);
            border-color: var(--dark-pink);
            color: var(--text-dark);
            box-shadow: 1px 1px 0px var(--dark-pink);
        }

        /* 결과 화면 디자인 */
        .result-section {
            display: none;
            border: 1px solid #E4EBEF;
            background-color: #FAFBFB;
            padding: 16px;
        }

        .result-title-bar {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 10px;
            border-bottom: 1px dotted #E4EBEF;
            padding-bottom: 6px;
        }

        .result-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-item {
            position: relative;
            font-size: 13px;
            color: var(--text-dark);
            word-break: break-all;
            line-height: 1.5;
            background-color: #FFFFFF;
            border: 1px solid #E4EBEF;
            padding: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .result-item:hover {
            background-color: var(--bg-pink);
            border-color: var(--dark-pink);
        }

        .toast-msg {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background-color: var(--dark-pink);
            color: #FFF;
            font-size: 10px;
            padding: 4px 8px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .toast-msg.show {
            opacity: 1;
        }

        /* 미니홈피 우측 장식용 세로 탭 */
        .side-tabs {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-left: -1px; 
            margin-top: 24px;
        }

        .tab {
            background-color: var(--main-pink);
            border: 1px solid var(--frame-border);
            border-left: none;
            color: var(--text-dark);
            font-size: 11px;
            font-weight: 700;
            padding: 10px 6px;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            cursor: default;
        }

        .tab.active {
            background-color: #FFFFFF;
            border-right: 1px solid transparent;
            z-index: 2;
            color: var(--dark-pink);
        }
    </style>
</head>
<body>

    <div class="minihomepy-container">
        <!-- 메인 미니홈피 창 -->
        <div class="outer-frame">
            <div class="inner-frame">
                <header>
                    <h1>♥ Links ♥</h1>
                    <div class="counter">TODAY <span class="today">486</span> | TOTAL 1205</div>
                </header>

                <div class="input-section">
                    <label>┌─ 변환할 URL 주소 입력 ─┐</label>
                    <div class="input-list" id="inputList">
                        <div class="input-row">
                            <input type="text" class="url-input" placeholder="http://..." autocomplete="off">
                            <button class="btn-remove" onclick="removeInput(this)" title="삭제">X</button>
                        </div>
                    </div>
                    <button class="btn-add" onclick="addInput()">+ URL 추가하기</button>
                </div>

                <div class="btn-group">
                    <button class="btn-action btn-run" onclick="prettifyURLs()">한번에 정리하기</button>
                    <button class="btn-action" onclick="clearAll()">전체 비우기</button>
                </div>

                <div class="result-section" id="resultPanel">
                    <div class="result-title-bar">
                        <span>결과 주소 (항목을 클릭하면 자동 복사)</span>
                    </div>
                    <div class="result-list" id="resultContainer">
                        <!-- 결과 아이템들이 여기에 추가됩니다 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 우측 감성 데코 탭 -->
        <div class="side-tabs">
            <div class="tab active">홈</div>
            <div class="tab" style="background-color: var(--main-mint);">정리</div>
        </div>
    </div>

    <script>
        // 새로운 URL 입력칸 추가
        function addInput() {
            const inputList = document.getElementById('inputList');
            const row = document.createElement('div');
            row.className = 'input-row';
            row.innerHTML = `
                <input type="text" class="url-input" placeholder="http://..." autocomplete="off">
                <button class="btn-remove" onclick="removeInput(this)" title="삭제">X</button>
            `;
            inputList.appendChild(row);
        }

        // 특정 URL 입력칸 삭제
        function removeInput(btnElement) {
            const row = btnElement.parentElement;
            const inputList = document.getElementById('inputList');
            // 최소 1개의 입력칸은 남겨둠
            if (inputList.children.length > 1) {
                inputList.removeChild(row);
            } else {
                row.querySelector('.url-input').value = '';
            }
        }

        // URL 정리 핵심 로직
        function prettifyURLs() {
            const inputs = document.querySelectorAll('.url-input');
            const resultContainer = document.getElementById('resultContainer');
            const resultPanel = document.getElementById('resultPanel');
            
            resultContainer.innerHTML = ''; // 기존 결과 초기화
            let hasValidUrl = false;

            const trackingParams = [
                'utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content',
                'fbclid', 'gclid', 'cx', 'ie', 'coid', 'campaign_id'
            ];

            inputs.forEach((input) => {
                let urlString = input.value.trim();
                if (!urlString) return; // 빈 칸은 건너뜀

                if (!/^https?:\/\//i.test(urlString)) {
                    urlString = 'http://' + urlString;
                }

                try {
                    const url = new URL(urlString);
                    
                    // 불필요한 트래킹 파라미터 제거
                    trackingParams.forEach(param => url.searchParams.delete(param));

                    // 한글 깨짐 방지 디코딩
                    let prettyURL = decodeURIComponent(url.toString());

                    // 결과 아이템 생성
                    const item = document.createElement('div');
                    item.className = 'result-item';
                    item.innerHTML = `
                        <span class="url-text">${prettyURL}</span>
                        <span class="toast-msg">복사 완료!</span>
                    `;
                    item.onclick = function() { copyToClipboard(this, prettyURL); };
                    
                    resultContainer.appendChild(item);
                    hasValidUrl = true;

                } catch (error) {
                    // 유효하지 않은 URL 처리
                    const errorItem = document.createElement('div');
                    errorItem.className = 'result-item';
                    errorItem.style.color = 'var(--dark-pink)';
                    errorItem.textContent = '올바르지 않은 URL 주소입니다.';
                    resultContainer.appendChild(errorItem);
                    hasValidUrl = true;
                }
            });

            if (hasValidUrl) {
                resultPanel.style.display = 'block';
            } else {
                alert('정리할 URL 주소를 1개 이상 입력해주세요.');
            }
        }

        // 전체 초기화
        function clearAll() {
            const inputList = document.getElementById('inputList');
            inputList.innerHTML = `
                <div class="input-row">
                    <input type="text" class="url-input" placeholder="http://..." autocomplete="off">
                    <button class="btn-remove" onclick="removeInput(this)" title="삭제">X</button>
                </div>
            `;
            document.getElementById('resultPanel').style.display = 'none';
        }

        // 클립보드 복사 및 개별 토스트 메시지
        function copyToClipboard(element, text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = element.querySelector('.toast-msg');
                if(toast) {
                    toast.classList.add('show');
                    setTimeout(() => {
                        toast.classList.remove('show');
                    }, 1500);
                }
            });
        }
    </script>
</body>
</html>
